<html lang="en"><head>
  <meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
<title>Kitchen Kompanion</title>
<style>

    /* root colors */
    :root {
        --bg-main: #e3f0fa;
        --bg-nav: #FEFFFF;
        --text-def: black;
        --button-active: #2e7d32;
        --screen-width: 640px;
        --wire: none;
    }

    /* device specifications from professor golub */
    .device { 
    margin:auto; 
    max-width: 640px;
    max-height: 960px;
    width: 640px;
    height: 960px;
    overflow: hidden;
    background-color: var(--bg-main);
    position: relative;
    font-size: 32pt;
    }

    /* DEVICE AND ROOT SHOULD BE THE ONLY THINGs HERE */

</style>

<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="pantry.css">
<link rel="stylesheet" href="list.css">

</head>
    <body>
        <!--- everything should go inside the device -->
        <div class="device">

            <!--- kitchen inventory tab here -->
            <div id="inv" class="tabcontent">
                <div class="invcontainer">

                    <h1 class="brandtitle">Kitchen<span class="brandgreen">Kompanion</span></h1>

                    <div class="search">
                        <input id="invsearch" type="text" placeholder="Search your inventory..." oninput="updateInvDisplay()">
                    </div>

                    <div class="listheader topheader">
                        <h2>Inventory</h2>
                        <div class="headeractions">
                            <button id="invsortexp" class="expiringsoon" onclick="sortInvItemExp()">
                                <span class="expiringsoon-icon">
                                    <svg id="expiringsoon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                        <path d="M3 18H9V16H3V18ZM3 6V8H21V6H3ZM3 13H15V11H3V13Z" fill="#0D631B"/>
                                    </svg>
                                </span>
                            <span>Expiring Soon</span>
                            </button>
                        </div>
                    </div>

                    <div class="sort">
                        <button class="locationtab active-tab" onclick="setInventoryFilter('All', this)">All</button>
                        <button class="locationtab" onclick="setInventoryFilter('Fridge', this)">Fridge</button>
                        <button class="locationtab" onclick="setInventoryFilter('Freezer', this)">Freezer</button>
                        <button class="locationtab" onclick="setInventoryFilter('Pantry', this)">Pantry</button>
                    </div>

                    <select onchange="updateInvDisplay()" id="listdropdown" style="display: none;">
                        <option value="All">All</option>
                        <option value="Fridge">Fridge</option>
                        <option value="Freezer">Freezer</option>
                        <option value="Pantry">Pantry</option>
                    </select>

                    <div class="listarea">
                        <div id="invlist" class="pantrylist">
                            <!-- inventory cards get added here -->
                        </div>
                    </div>

                    <button id="invitemadd" class="itemadd floatingadd" onclick="openInvAddForm()">+</button>
                    <button id="invitemdeletetoggle" class="floatingtrash" onclick="toggleInvDeleteMode()">trash</button>
                    <button id="invdeletecancel" class="itemdeletecancel" onclick="itemInvDeleteCancel()">cancel</button>

                </div>

            </div>

            <!--- live update grocery list here -->
            <div id="grocerylist" class="tabcontent">
                
                <h1>Grocery List</h1>

                <div class="grocerycontainer">

                    <div class="listheader">

                        <button id="groceryitemadd" class="itemadd" onclick="openListAddForm()">add</button>

                    </div>

                    <div class="listarea">

                        <ul id="grocerylist" class="grocerylist">
                            <li class="header-row-grocery">
                                <span>Name</span>
                                <span>Quantity</span>
                                <span>Expiration</span>
                                <span></span>
                            </li>

                        </ul>

                    </div>

                </div>

            </div>

            <!-- recipes tab here -->
            <div id="recipes" class="tabcontent">
                <p>recipe</p>
            </div>

            <!-- members tab here -->
            <div id="members" class="tabcontent">
                <p>members</p>
            </div>

            <!-- navbar here -->
            <div class="navbar">
                <div class="tabcontainer">
                    <button class="tablink" onclick="openTab('inv', this)" >Inventory</button>
                    <button class="tablink" onclick="openTab('grocerylist', this)" id="defaultOpen">List</button>
                    <button class="tablink" onclick="openTab('recipes', this)">Recipes</button>
                    <button class="tablink" onclick="openTab('members', this)">Members</button>
                </div>
            </div>

            <!-- Pantry List Add Form -->
            <div id="invaddform" class="form-popup">
                <form class="form-container" onsubmit="return addListItemFormSubmit()">
                    <h2>New Item</h2>

                    <label for="invnewname"><b>Name</b></label>
                    <p id="invformnamewarning" class="formwarning">An Item with this name already exists!</p>
                    <input type="text" id="invnewname" placeholder="Enter item name..." required>

                    <label for="invnewdrop"><b>Location</b></label>
                    <select id="invnewdrop" required></select>

                    <label for="invnewquantity"><b>Quantity</b></label>
                    <input type="text" id="invnewquantity" placeholder="Enter item quantity...">

                    <label for="invnewdate"><b>Expiration Date</b></label>
                    <input type="date" id="invnewdate">

                    <button type="submit">Submit</button>
                    <button type="button" onclick="closeListAddForm()">Close</button>
                </form>
            </div>

            <!-- Pantry List Edit Form -->
            <div id="inveditform" class="form-popup">
                <form class="form-container" onsubmit="return editListItemFormSubmit()">
                    <h2>Edit Item</h2>

                    <label for="inveditname"><b>Name</b></label>
                    <p id="invformnamewarningedit" class="formwarning">An Item with this name already exists!</p>
                    <input type="text" id="inveditname" placeholder="Enter item name..." required>

                    <label for="inveditdrop"><b>Location</b></label>
                    <select id="inveditdrop" required></select>

                    <label for="inveditquantity"><b>Quantity</b></label>
                    <input type="text" id="inveditquantity" placeholder="Enter item quantity...">

                    <label for="inveditdate"><b>Expiration Date</b></label>
                    <input type="date" id="inveditdate">

                    <button type="submit">Submit</button>
                    <button type="button" onclick="closeListEditForm()">Close</button>
                </form>
            </div>

            <div id="overlay" class="overlay"></div>

        </div>

        <script>

            // rips colors out of root styling, add more as needed
            const rootStyles = getComputedStyle(document.documentElement);
            const bg_main = rootStyles.getPropertyValue('--bg-main');
            const text_def = rootStyles.getPropertyValue('--text-def');
            const bg_nav = rootStyles.getPropertyValue('--bg-nav');
            const button_active = rootStyles.getPropertyValue('--button-active');

            /* THE ONLY CODE IN HERE SHOULD BE NAVBAR!! */
            /* use a different file for anything else please */

            function openTab(tabName, elmnt) {
                var i, tabcontent, tablinks;

                // get all tabcontents
                tabcontent = document.getElementsByClassName("tabcontent");

                // set all to hidden
                for(i=0; i < tabcontent.length; i++) {
                    tabcontent[i].style.display = "none";
                }

                // get all tab buttons
                tablinks = document.getElementsByClassName("tablink");

                // set all to basic background color
                for(i=0; i < tablinks.length; i++) {
                    tablinks[i].classList.remove("nav-active");
                }

                // set selected tab content to visible and tab button to selected
                document.getElementById(tabName).style.display = "block";
                elmnt.classList.add("nav-active");

            }

            // default open tab

            document.getElementById("defaultOpen").click();


        </script>

        
        <script src="pantry.js"></script>

    </body>
</html>
