<html lang="en"><head>
  <meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
<title>Kitchen Kompanion</title>
<style>

    /* root colors */
    :root {
        --bg-main: #e3f0fa;
        --bg-nav: #FEFFFF;
        --text-def: black;
        --button-active: #2e7d32;
        --screen-width: 640px;
        --wire: solid;
    }

    /* device specifications from professor golub */
    .device { 
    margin:auto; 
    max-width: 640px;
    max-height: 960px;
    width: 640px;
    height: 960px;
    overflow: hidden;
    background-color: var(--bg-main);
    position: relative;
    font-size: 32pt;
    }

    /* DEVICE AND ROOT SHOULD BE THE ONLY THINGs HERE */

</style>

<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="pantry.css">

</head>
    <body>
        <!--- everything should go inside the device -->
        <div class="device">

            <!--- kitchen inventory tab here -->
            <div id="pantry" class="tabcontent">

                <div class="pantrycontainer">

                    <h1>Pantry</h1>

                    <div class="search">
                        <input id="listitemsearch" type="text" placeholder="Search...">
                        <button onclick="searchListItems()"> Sort by Relevance</button>
                    </div>

                    <div class="sort">
                        <h2>Sort by: </h2>
                        <button onclick="sortListItemAlpha()">Alpha</button>
                        <button onclick="sortListItemExp()">Expiration</button>
                    </div>

                    <div class="listheader">
                        <h2> Showing: </h2>
                        <select onchange="updateListDisplay()" id="listdropdown">
                        </select>
                        <button onclick="openListAddForm()">add</button>
                        <button>trash</button>
                    </div>

                    <div class="listarea">

                        <ul id="pantrylist" class="pantrylist">
                            <li class="header-row">
                                <span>Name</span>
                                <span>Quantity</span>
                                <span>Expiration</span>
                            </li>

                        </ul>

                    </div>



                </div>

            </div>

            <!--- live update grocery list here -->
            <div id="grocerylist" class="tabcontent">
                <p>gorcery</p>
            </div>

            <!-- recipes tab here -->
            <div id="recipes" class="tabcontent">
                <p>recipe</p>
            </div>

            <!-- members tab here -->
            <div id="members" class="tabcontent">
                <p>members</p>
            </div>

            <!-- navbar here -->
            <div class="navbar">
                <div class="tabcontainer">
                    <button class="tablink" onclick="openTab('pantry', this)" id="defaultOpen">Pantry</button>
                    <button class="tablink" onclick="openTab('grocerylist', this)">List</button>
                    <button class="tablink" onclick="openTab('recipes', this)">Recipes</button>
                    <button class="tablink" onclick="openTab('members', this)">Members</button>
                </div>
            </div>

            <!-- Pantry List Add Form -->
            <div id="listaddform" class="form-popup">
                <form class="form-container" onsubmit="return addListItemFormSubmit()">
                    <h2>New Item</h2>

                    <label for="newlistitemname"><b>Name</b></label>
                    <input type="text" id="newlistitemname" placeholder="Enter item name..." required>

                    <label for="newlistitemdropdown"><b>Location</b></label>
                    <select id="newlistitemdropdown" required></select>

                    <label for="newlistitemquantity"><b>Quantity</b></label>
                    <input type="text" id="newlistitemquantity" placeholder="Enter item quantity...">

                    <label for="newlistitemdate"><b>Expiration Date</b></label>
                    <input type="date" id="newlistitemdate">

                    <button type="submit">Submit</button>
                    <button type="button" onclick="closeListAddForm()">Close</button>
                </form>
            </div>

            <div id="overlay" class="overlay"></div>

        </div>

        


        <script>

            // rips colors out of root styling, add more as needed
            const rootStyles = getComputedStyle(document.documentElement);
            const bg_main = rootStyles.getPropertyValue('--bg-main');
            const text_def = rootStyles.getPropertyValue('--text-def');
            const bg_nav = rootStyles.getPropertyValue('--bg-nav');
            const button_active = rootStyles.getPropertyValue('--button-active');

            /* THE ONLY CODE IN HERE SHOULD BE NAVBAR!! */
            /* use a different file for anything else please */

            function openTab(tabName, elmnt) {
                var i, tabcontent, tablinks;

                // get all tabcontents
                tabcontent = document.getElementsByClassName("tabcontent");

                // set all to hidden
                for(i=0; i < tabcontent.length; i++) {
                    tabcontent[i].style.display = "none";
                }

                // get all tab buttons
                tablinks = document.getElementsByClassName("tablink");

                // set all to basic background color
                for(i=0; i < tablinks.length; i++) {
                    tablinks[i].classList.remove("nav-active");
                }

                // set selected tab content to visible and tab button to selected
                document.getElementById(tabName).style.display = "block";
                elmnt.classList.add("nav-active");

            }

            // default open tab

            document.getElementById("defaultOpen").click();


        </script>

        
        <script src="pantry.js"></script>

    </body>
</html>
