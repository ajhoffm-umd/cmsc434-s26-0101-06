
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
<title>Example</title>
<style>

.device { /* device specifications from professor golub */
  margin:auto; 
  max-width: 640px;
  max-height: 960px;
  width: 640px;
  height: 960px;
  overflow: hidden;
  background-color: #555;
  position: relative;
}

h1 {
  font-size: 28pt;
}

/* Style the tab buttons */
.tablink {
  background-color: #555;
  color: white;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  font-size: 17px;
  width: calc(100% / 6); /* kind of old solution for even split between 6 div*/
  height: 10%;
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
}

/* Change background color of buttons on hover */
.tablink:hover {
  background-color: #777;
}

/* Set default styles for tab content */
.tabcontent {
  color: white;
  height: 80%;
  display: none;
  padding: 50px;
  text-align: center;
  overflow-y: auto;
}

/* Style each tab content individually */
#tab1 {background-color:red; text-align:left; }
#tab2 {background-color:green;}
#tab3 {background-color:blue;}
#tab4 {background-color:orange;}
#tab5 {background-color:purple;}
#tab6 {background-color:teal;}

/* for tab6 */
.taskList {
  margin: 15;
  padding: 0;
  list-style-type: none;
}

.taskList li {
  margin-top: 6px;
  cursor: pointer;
  position: relative;
  padding: 12px 8px 12px 40px;
  background: white;
  font-size: 18px;
  transition: 0.2s;
  color: black;
  border-radius: 15px;

  /* make the list items unselectable */
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

.taskList li:nth-child(odd) {
  background: lightgrey
}

.taskList li:hover {
  background: lightcyan;
  box-shadow: 3px 4px #555;
}

.taskList li.checked {
  background: #888;
  color: #fff;
  text-decoration: line-through;
}

ul li.checked::before {
  content: '';
  position: absolute;
  border-color: #fff;
  border-style: solid;
  border-width: 0 2px 2px 0;
  top: 10px;
  left: 16px;
  transform: rotate(45deg);
  height: 15px;
  width: 7px;
}

.close {
  position: absolute;
  right: 2;
  top: 2;
  padding: 10px 16px 10px 16px;
  border-radius: 15px;
}

.close:hover {
  background-color: #f44336;
  color: white;
}

.tab6header {
  background-color: darkslategrey;
  padding: 30px 40px;
  color: white;
  text-align: center;
  border-radius: 15px;
}

.tab6header:after {
  content: "";
  display: table;
  clear: both;
}

input {
  margin: 0;
  border: none;
  border-radius: 5px;
  width: 75%;
  padding: 10px;
  float: center;
  font-size: 16px;
}

.addButton {
  padding: 10px;
  width: 20%;
  background: #d9d9d9;
  color: #555;
  float: center;
  text-align: center;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  border-radius: 5px;
}

.addButton:hover {
  background-color: greenyellow;
}

</style>


</head>

<body>
<div class="device">

    <div id="tab1" class="tabcontent">
        <h1> -Text Screen- </h1>
        <p id="tab1content"></p>
    </div>
        
    <div id="tab2" class="tabcontent">
        <h1>tab2</h1>
        <p>tab2 is the capital of France.</p>
    </div>

    <div id="tab3" class="tabcontent">
        <h1>tab3</h1>
        <p>tab3 is the capital of Japan.</p>
    </div>

    <div id="tab4" class="tabcontent">
        <h1>tab4</h1>
        <p>tab4 is the capital of Norway.</p>
    </div>

    <div id="tab5" class="tabcontent">
    </div>

    <div id="tab6" class="tabcontent">

      <div id="tab6header" class="tab6header">
        <h2> To-Do List </h2>
        <input type="text" id="toDoInput" placeholder="Task..."/>
        <span onclick="newElement()" class="addButton"> Add </span>
      </div>

      <ul id="taskList" class="taskList">
        <li> Go to work </li>
        <li class="checked"> Walk the dog </li>
        <li> Complete homework </li>
        <li> Make dinner </li>
      </ul>

    </div>

    <button class="tablink" onclick="openCity('tab1', this, 'red')" >tab1</button>
    <button class="tablink" onclick="openCity('tab2', this, 'green')">tab2</button>
    <button class="tablink" onclick="openCity('tab3', this, 'blue')">tab3</button>
    <button class="tablink" onclick="openCity('tab4', this, 'orange')">tab4</button>
    <button class="tablink" onclick="openCity('tab5', this, 'purple')">tab5</button>
    <button class="tablink" onclick="openCity('tab6', this, 'teal')" id="defaultOpen">tab6</button>

</div>

<script>
function openCity(cityName,elmnt,color) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablink");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].style.backgroundColor = "";
  }
  document.getElementById(cityName).style.display = "block";
  elmnt.style.backgroundColor = color;

}
// Get the element with id="defaultOpen" and click on it
document.getElementById("defaultOpen").click();

// get the text from the other file cause having it here is annoying
fetch("lorem.txt").then(response => response.text()).then(text => document.getElementById("tab1content").textContent = text);


//tab6
// appending x button children to the list items
var myNodelist = document.getElementsByTagName("LI");
var i;
for (i = 0; i < myNodelist.length; i++) {
  var span = document.createElement("SPAN");
  var txt = document.createTextNode("\u00D7");
  span.className = "close";
  span.appendChild(txt);
  myNodelist[i].appendChild(span);
}

// helps us hide things that are "deleted"
var close = document.getElementsByClassName("close");
var i;
for (i = 0; i < close.length; i++) {
  close[i].onclick = function() {
    var div = this.parentElement;
    div.remove();
  }
}

// toggle class list for list elements when clicked
var list = document.querySelector('ul');
list.addEventListener('click', function(ev) {
  if (ev.target.tagName === 'LI') {
    ev.target.classList.toggle('checked');
  }
}, false);

function newElement() {
  // create a new element on the page with tag str
  var li = document.createElement("LI"); 
  // get the string from the input element
  var inputValue = document.getElementById("toDoInput").value;
  // create a new text node with the string from input
  var t = document.createTextNode(inputValue);
  // append the text t into the new list element
  li.appendChild(t);

  if (inputValue === '') {
    alert("You must write something!");
  } else {
    document.getElementById("taskList").appendChild(li);
  }
  document.getElementById("toDoInput").value = "";

  // don't forget to add the close button to new elements
  var span = document.createElement("SPAN");
  var txt = document.createTextNode("\u00D7");
  span.className = "close";
  span.appendChild(txt);
  li.appendChild(span);

  for (i = 0; i < close.length; i++) {
    close[i].onclick = function() {
      var div = this.parentElement;
      div.style.display = "none";
    }
  }

}


</script>

</body></html>
